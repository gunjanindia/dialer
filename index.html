<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beauty Parlour Dialer</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* FULL SCREEN CARD */

.card{
background:white;
width:96%;
height:96%;
padding:20px;
box-sizing:border-box;

display:flex;
flex-direction:column;
justify-content:space-between;

border-radius:0;
}

h2{
font-size:22px;
margin-bottom:10px;
}

.field{
margin:6px 0;
font-size:16px;
}

/* BIG CALL BUTTON */

.call{
background:#27ae60;
color:white;
width:100%;
font-size:26px;
padding:22px;
border:none;
border-radius:10px;
font-weight:bold;
}

/* NAVIGATION */

.nav{
display:flex;
gap:10px;
}

.prev{
background:#95a5a6;
color:white;
flex:1;
}

.next{
background:#3498db;
color:white;
flex:1;
}

/* STATUS */

.statusbuttons{
display:flex;
gap:10px;
margin-top:10px;
}

.called{background:#27ae60;color:white;flex:1}
.notint{background:#e74c3c;color:white;flex:1}
.follow{background:#f39c12;color:white;flex:1}

button{
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.status{
margin-top:10px;
font-weight:bold;
font-size:18px;
}

/* DESKTOP */

@media (min-width:700px){

.card{
height:96%;
margin:40px auto;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}


</style>
</head>

<body>

<div class="card">

<h2 id="leadname"></h2>

<div class="field">📞 <span id="phone"></span></div>
<div class="field">⭐ Rating: <span id="rating"></span></div>
<div class="field">📝 Reviews: <span id="reviews"></span></div>
<div class="field">🌐 <a id="website" target="_blank"></a></div>
<div class="field">📍 <span id="address"></span></div>
<div class="field">🗺 <a id="maps" target="_blank">Open Maps</a></div>

<br>
<a id="callbtn">
<button class="call">📞 CALL NOW</button>
</a>
<br><br>
<div class="nav">
<button class="prev" onclick="prevLead()">⬅ Prev</button>
<button class="next" onclick="nextLead()">Next ➡</button>
</div>

<div class="statusbuttons">
<button class="called" onclick="setStatus('Called')">Called</button>
<button class="notint" onclick="setStatus('Not Interested')">Not Interested</button>
<button class="follow" onclick="setStatus('Follow Up')">Follow Up</button>
</div>
<div class="status" id="status"></div>
<div id="progress"></div>

</div>

let current=0

function loadLead(){

let l=leads[current]

leadname.innerText=l.Name
phone.innerText=l.Phone
rating.innerText=l.Rating
reviews.innerText=l.Reviews
address.innerText=l.Address
//let phone = l.Phone.replace(/\s+/g,'').replace(/^0+/,'');
callbtn.href = "tel:" + l.Phone.replace(/\s+/g,'').replace(/^0+/,'');


maps.href=l["Maps URL"];
if(l.Website){
website.href=l.Website
website.innerText=l.Website
}else{
website.innerText="No website"
website.removeAttribute("href")
}

let s=localStorage.getItem("lead_"+current) || "Not Called"

status.innerText="Status: "+s
progress.innerText=(current+1)+" / "+leads.length

}

function nextLead(){

if(current<leads.length-1){
current++
loadLead()
}

}

function prevLead(){

if(current>0){
current--
loadLead()
}

}

function setStatus(s){

localStorage.setItem("lead_"+current,s)
loadLead()

}

loadLead()
